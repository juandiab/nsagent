# Production overrides for docker-compose.yml.
# Use together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# or ./compose.sh up -d --build when NSAGENT_DEPLOY_MODE=prod in .env
services:
  frontend: !reset null

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://localhost/api}
    environment:
      - NGINX_HOSTNAME=${NGINX_HOSTNAME:-localhost}
    depends_on: !override
      backend-api:
        condition: service_healthy

  backend-api:
    build:
      target: prod
    volumes: !override
      - ./backend-api/app/resources:/app/app/resources:ro
    environment:
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-https://localhost}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://localhost}
    depends_on: !override
      mongodb:
        condition: service_healthy
      mcp-server:
        condition: service_healthy

  mcp-server:
    build:
      target: prod
    volumes: !override []
