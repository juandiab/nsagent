services:
  nginx:
    build: ./nginx
    ports:
      - "443:443"
    environment:
      - NGINX_HOSTNAME=${NGINX_HOSTNAME:-jpilot.nexxus-tech.com}
    volumes:
      - ${SSL_CERTS_PATH:-./nginx/ssl}:/etc/nginx/ssl:ro
    networks:
      - nsagent-network
    depends_on:
      - frontend
      - backend-api

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://jpilot.nexxus-tech.com/api}
      - NGINX_HOSTNAME=${NGINX_HOSTNAME:-jpilot.nexxus-tech.com}
    networks:
      - nsagent-network
    depends_on:
      - backend-api

  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend-api:/app
      - ./netscaler_nextgen_api_memory.md:/app/app/resources/netscaler_nextgen_api_memory.md:ro
      - ./netscaler_adc_cli_memory.md:/app/app/resources/netscaler_adc_cli_memory.md:ro
    environment:
      - NSAGENT_ENCRYPTION_KEY=${NSAGENT_ENCRYPTION_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=nsagent
      - MCP_SERVER_URL=http://mcp-server:8001
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-jpilot.nexxus-tech.com}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-NSAgent}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-https://jpilot.nexxus-tech.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://jpilot.nexxus-tech.com}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - PASSWORD_RESET_LOG_CODES=${PASSWORD_RESET_LOG_CODES:-false}
    networks:
      - nsagent-network
    depends_on:
      - mongodb
      - mcp-server

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    volumes:
      - ./mcp-server:/app
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    networks:
      - nsagent-network

  mongodb:
    image: mongo:latest
    volumes:
      - nsagent_mongodb_data:/data/db
    networks:
      - nsagent-network

networks:
  nsagent-network:

volumes:
  nsagent_mongodb_data:
