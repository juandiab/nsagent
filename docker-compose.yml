services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    networks:
      - netscaler-copilot-network
    depends_on:
      - backend-api

  backend-api:
    build: ./backend-api
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend-api:/app
      - ./netscaler_nextgen_api_memory.md:/app/app/resources/netscaler_nextgen_api_memory.md:ro
      - ./netscaler_adc_cli_memory.md:/app/app/resources/netscaler_adc_cli_memory.md:ro
    environment:
      - NSAGENT_ENCRYPTION_KEY=${NSAGENT_ENCRYPTION_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=netscaler_copilot
      - MCP_SERVER_URL=http://mcp-server:8001
    networks:
      - netscaler-copilot-network
    depends_on:
      - mongodb
      - mcp-server

  mcp-server:
    build: ./mcp-server
    ports:
      - "8001:8001"
    volumes:
      - ./mcp-server:/app
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    networks:
      - netscaler-copilot-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - netscaler-copilot-network

networks:
  netscaler-copilot-network:

volumes:
  mongodb_data:
