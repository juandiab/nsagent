name: jpilot

services:
  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      - NGINX_HOSTNAME=${NGINX_HOSTNAME:-jpilot.nexxus-tech.com}
    volumes:
      - ${SSL_CERTS_PATH:-./nginx/ssl}:/etc/nginx/ssl:ro
    networks:
      - jpilot-network
    depends_on:
      - frontend
      - backend-api

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://jpilot.nexxus-tech.com/api}
      - NGINX_HOSTNAME=${NGINX_HOSTNAME:-jpilot.nexxus-tech.com}
    networks:
      - jpilot-network
    depends_on:
      - backend-api

  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
      target: dev
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend-api:/app
      - ./VERSION:/usr/share/jpilot/VERSION:ro
    environment:
      - NSAGENT_ENCRYPTION_KEY=${NSAGENT_ENCRYPTION_KEY}
      - NGINX_HOSTNAME=${NGINX_HOSTNAME:-jpilot.nexxus-tech.com}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=nsagent
      - MCP_SERVER_URL=http://mcp-server:8001
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-jpilot.nexxus-tech.com}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-JPilot}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-https://jpilot.nexxus-tech.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://jpilot.nexxus-tech.com}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - PASSWORD_RESET_LOG_CODES=${PASSWORD_RESET_LOG_CODES:-false}
    networks:
      - jpilot-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      mcp-server:
        condition: service_healthy

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./mcp-server:/app
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8001/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - jpilot-network

  mongodb:
    image: mongo:8.2
    restart: unless-stopped
    # TEMPORARY: expose for local DB inspection — remove ports when done
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mongodb_data:/data/db
    networks:
      - jpilot-network

networks:
  jpilot-network:

volumes:
  mongodb_data:
